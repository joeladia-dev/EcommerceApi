name: deploy-api

on:
  push:
    branches:
      - main
    paths:
      - EcommerceApi/**
      - infra/**
      - tests/**
      - .github/workflows/deploy-api.yml
      - .github/workflows/reusable-azure-appservice-api.yml
  workflow_dispatch:
    inputs:
      provision_infra:
        description: Provision/update Azure infrastructure from Bicep before API deployment
        required: false
        default: false
        type: boolean
      run_tests:
        description: Run integration tests before deploy
        required: false
        default: false
        type: boolean
      build_configuration:
        description: Build configuration
        required: false
        default: Release
        type: choice
        options:
          - Release
          - Debug

concurrency:
  group: deploy-api-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  provision-infra:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.provision_infra }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep what-if
        run: |
          az deployment group what-if \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters @infra/main.parameters.json \
            --parameters postgresAdminPassword='${{ secrets.POSTGRES_ADMIN_PASSWORD }}'

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters @infra/main.parameters.json \
            --parameters postgresAdminPassword='${{ secrets.POSTGRES_ADMIN_PASSWORD }}'

  deploy:
    needs: [provision-infra]
    if: ${{ always() && (needs.provision-infra.result == 'success' || needs.provision-infra.result == 'skipped') }}
    uses: ./.github/workflows/reusable-azure-appservice-api.yml
    with:
      project_path: EcommerceApi/EcommerceApi.csproj
      startup_project_path: EcommerceApi
      dotnet_version: 10.0.x
      test_project_path: tests/EcommerceApi.ApiTests/EcommerceApi.ApiTests.csproj
      build_configuration: ${{ github.event_name == 'workflow_dispatch' && inputs.build_configuration || 'Release' }}
      run_tests: ${{ github.event_name == 'workflow_dispatch' && inputs.run_tests || false }}
      resource_group: ${{ vars.AZURE_RESOURCE_GROUP }}
      webapp_name: ${{ vars.AZURE_WEBAPP_NAME }}
      environment_name: production
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      POSTGRES_CONNECTION_STRING: ${{ secrets.POSTGRES_CONNECTION_STRING }}
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
      JWT_KEY: ${{ secrets.JWT_KEY }}
