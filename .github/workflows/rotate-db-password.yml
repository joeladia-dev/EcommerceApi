name: rotate-db-password

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: Azure resource group (leave empty to use AZURE_RESOURCE_GROUP variable)
        required: false
        default: ""
        type: string
      webapp_name:
        description: Azure Web App name (leave empty to use AZURE_WEBAPP_NAME variable)
        required: false
        default: ""
        type: string
      postgres_server_name:
        description: PostgreSQL flexible server name
        required: false
        default: pg-ecommerceapi-prod
        type: string
      postgres_admin_login:
        description: PostgreSQL admin login name
        required: false
        default: pgadmin
        type: string
      postgres_database_name:
        description: PostgreSQL database name
        required: false
        default: ecommerce_prod
        type: string
      api_smoke_url:
        description: API smoke-test URL
        required: false
        default: https://app-ecommerceapi-prod.azurewebsites.net/api/categories
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve deployment target
        id: target
        run: |
          RG='${{ inputs.resource_group }}'
          WEBAPP='${{ inputs.webapp_name }}'
          if [ -z "$RG" ]; then RG='${{ vars.AZURE_RESOURCE_GROUP }}'; fi
          if [ -z "$WEBAPP" ]; then WEBAPP='${{ vars.AZURE_WEBAPP_NAME }}'; fi

          if [ -z "$RG" ] || [ -z "$WEBAPP" ]; then
            echo "resource_group and webapp_name are required (either workflow input or repository variable)." >&2
            exit 1
          fi

          echo "resource_group=$RG" >> "$GITHUB_OUTPUT"
          echo "webapp_name=$WEBAPP" >> "$GITHUB_OUTPUT"

      - name: Rotate PostgreSQL password and update app settings
        id: rotate
        run: |
          NEW_PW="Pg!$(cat /proc/sys/kernel/random/uuid | tr -d '-')Aa1"
          echo "::add-mask::$NEW_PW"

          az postgres flexible-server update \
            --resource-group '${{ steps.target.outputs.resource_group }}' \
            --name '${{ inputs.postgres_server_name }}' \
            --admin-password "$NEW_PW" \
            --output none

          PG_FQDN=$(az postgres flexible-server show \
            --resource-group '${{ steps.target.outputs.resource_group }}' \
            --name '${{ inputs.postgres_server_name }}' \
            --query fullyQualifiedDomainName -o tsv)

          CONN="Host=${PG_FQDN};Port=5432;Database=${{ inputs.postgres_database_name }};Username=${{ inputs.postgres_admin_login }};Password=${NEW_PW};Ssl Mode=Require;Trust Server Certificate=true"
          echo "::add-mask::$CONN"

          az webapp config appsettings set \
            --resource-group '${{ steps.target.outputs.resource_group }}' \
            --name '${{ steps.target.outputs.webapp_name }}' \
            --settings ConnectionStrings__DefaultConnection="$CONN" \
            --output none

      - name: Validate app configuration and smoke test
        run: |
          CONN_VALUE=$(az webapp config appsettings list \
            --resource-group '${{ steps.target.outputs.resource_group }}' \
            --name '${{ steps.target.outputs.webapp_name }}' \
            --query "[?name=='ConnectionStrings__DefaultConnection'].value | [0]" -o tsv)

          if ! echo "$CONN_VALUE" | grep -q 'postgres.database.azure.com'; then
            echo "ConnectionStrings__DefaultConnection does not point to Azure PostgreSQL." >&2
            exit 1
          fi

          if ! echo "$CONN_VALUE" | grep -q 'Database=${{ inputs.postgres_database_name }}'; then
            echo "ConnectionStrings__DefaultConnection does not point to the expected database." >&2
            exit 1
          fi

          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" '${{ inputs.api_smoke_url }}')
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed with status $STATUS" >&2
            exit 1
          fi

      - name: Post-rotation reminder
        run: |
          echo "Rotation completed successfully."
          echo "Update GitHub secret POSTGRES_CONNECTION_STRING to match the new password before the next deploy."
